<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="display: grid; grid-template-columns: 300px 300px 300px 300px; grid-template-rows: 200px 200px 200px 200px; gap: 20px;">
        <div style="background-color: rgb(31, 196, 2); grid-row-start: 1; grid-row-end: 4;"></div>
        <div style="background-color: rgb(31, 196, 2); grid-column-start: 2; grid-column-end: 4;"></div>
        <div style="background-color: red;"></div>
        <div style="background-color: orange;"></div>
        <div style="background-color: red;"></div>
        <div style="background-color: rgb(31, 196, 2); grid-row-start: 2; grid-row-end: 4; grid-column-start: 4; grid-column-end: 4;"></div>
        <div style="background-color: red;"></div>
        <div style="background-color: orange;"></div>
    </div>

    <div style="display: grid;gap: 20px; grid-template-columns: 75px 75px 75px 75px 75px 75px 75px 75px 75px 75px 75px 75px 75px 75px ; grid-template-rows: 75px 75px 75px 75px 75px 75px 75px ;">
        <div style="background-color: red; grid-row-start: 1; grid-row-end: 5; grid-column-start: 1; grid-column-end: 4;"></div>
        <div style="background-color: cyan; grid-row-start: 1; grid-row-end: 3; grid-column-start: 4; grid-column-end: 9;"></div>
        <div style="background-color: rgb(216, 162, 85); grid-row-start: 1; grid-row-end: 3; grid-column-start: 9; grid-column-end: 15;"></div>
        <div style="background-color: rgb(216, 162, 85); grid-row-start: 3; grid-row-end: 6; grid-column-start: 4; grid-column-end: 7;"></div>
        <div style="background-color: rgb(188, 188, 188); grid-column-start: 7; grid-column-end: 12; grid-row-start: 3; grid-row-end: 6;"></div>
        <div style="background-color: red; grid-row-start: 3; grid-row-end: 8; grid-column-start: 12; grid-column-end: 15;"></div>
        <div style="background-color: rgb(188, 188, 188); grid-row-start: 5; grid-row-end: 8; grid-column-start: 1; grid-column-end: 4;"></div>
        <div style="background-color: red; grid-row-start: 6; grid-row-end: 8; grid-column-start: 4; grid-column-end: 9;"></div>
        <div style="background-color: cyan; grid-column-start: 9; grid-column-end: 12; grid-row-start: 6; grid-row-end: 8;"></div>
    </div>
    <div style="display: grid; gap:15px; grid-template-columns: 220px 220px 220px; grid-template-rows: 220px 220px 220px; margin-top: 100px; ">
        <div style="background-color: red;"></div>
        <div style="background-color: red; grid-column-start: 2; grid-column-end: 4; "></div>
        <div style="background-color: red; grid-column-start: 1; grid-column-end: 3;"></div>
        <div style="background-color: red; grid-row-start: 2; grid-row-end: 4; grid-column-start: 3; grid-column-end: 4;"></div>
        <div style="background-color: red;"></div>
        <div style="background-color: red;"></div>
    </div>                      
    <div style="display: grid; gap: 5px; grid-template-columns: 200px 200px 200px 200px ; grid-template-rows: 200px 200px; margin-top: 100px;">
        <div style="background-color: rgb(243, 97, 122); grid-row-start: 1; grid-row-end: 3; grid-column-start: 1; grid-column-end: 3;border-radius: 20px;"></div>
        <div style="background-color: orange; grid-column-start: 3; grid-column-end: 5;border-radius: 20px;"></div>
        <div style="background-color: purple;border-radius: 20px;"></div>
        <div style="background-color: grey; border-radius: 20px;"></div>
    </div>
</body>
</html>
