<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | E-commerce product page</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div id="main">
    <div id="bar">
      <div id="barl">
        <div id="sneakers">
          <h1>sneakers</h1>
        </div>
        <div id="rest">
          <h2>Collections</h2>
          <h2>Men</h2>
          <h2>Women</h2>
          <h2>About</h2>
          <h2>Contact</h2>
        </div>
      </div>
      <div id="barr">
        <img src="images/icon-cart.svg" alt="" id="im1">
        <img src="images/image-avatar.png" alt="" id="im2">
      </div>
    </div>
    <div id="lower">
      <div id="left">
        <div id="single">
          <img src="images/image-product-1.jpg" alt="">
        </div>
        <div id="set">
          <div style="border: 4px solid hsl(26, 100%, 55%);border-radius: 20px;">
            <img src="images/image-product-1-thumbnail.jpg" alt="" style="opacity: 0.3;">
          </div>
          <img src="images/image-product-2-thumbnail.jpg" alt="">
          <img src="images/image-product-3-thumbnail.jpg" alt="">
          <img src="images/image-product-4-thumbnail.jpg" alt="">
        </div>
      </div>
      <div id="right">
        <div id="s">
          <h3>SNEAKER COMPANY</h3>
          <h1>Fall Limited Edition Sneakers</h1>
        </div>
        <div id="a">
          <h4>These low-profile sneakers are your perfect casual wear companion. Featuring a durable rubber outer sole, they’ll withstand everything the weather can offer.</h4>
          <div id="p1">
            <div id="p">
              <h5>$125.00</h5>
              <div style="background-color: black; border-radius: 10px;"><h6>50%</h6></div>
            </div>
            <div style="display: flex; align-items: end; height: 100px;"><h3>$250.00</h3></div>
          </div>
        </div>
        <div id="button">
          <div id="amount">
            <img src="images/icon-minus.svg" alt="" style="height: 10px;">
            <p>0</p>
            <img src="images/icon-plus.svg" alt="">
          </div>
          <button> <img src="images/icon-cart.svg" alt="">Add to cart</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
