<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div style="display: flex;">
            <div id="cards">
                <img src="bg-card-front.png" alt="" id="fron">
                <div id="front">
                    <!-- მასწ არ გამომდიოდა ფაილით და ესე დავწერე :( -->
                    <img src="card-logo.svg" alt="">
                    <p style="padding-top: 60px; font-weight: 600; font-size: 50px; letter-spacing: 2px;">0000 0000 0000 0000</p>
                    <div style="padding-top: 40px; display: flex; gap:340px; font-size: 22px; font-weight: 500; letter-spacing: 2px;">
                        <p>JANE APPLESEED</p>
                        <p>00/00</p>
                    </div>
                </div>
                <img src="bg-card-back.png" alt="" id="back">
                <div >
                    <h2 style="z-index: 2; color: rgb(255, 255, 255); position: relative; left: 420px; top: 590px;">000</h2>
                </div>
            </div>
            <div >
                <form action="" style="text-transform: uppercase; display: flex; flex-direction: column; gap: 25px; width: 200px; position: absolute;right: 800px; top: 320px; font-weight: 600; letter-spacing: 2px;">
                    <label for="name" style="margin-top: 100px;">Cardholder Name</label>
                    <input type="text" id="name" placeholder="e.g. Jane Appleseed" style="width: 570px; height: 60px; margin-bottom: 30px; font-size: 20px; padding: 10px; border-radius: 10px; color: gray; border-color: rgb(211, 211, 211); font-family: 'Space Grotesk';">
                    <label for="num">Card Number</label>
                    <input type="text" id="num" placeholder="e.g. 1234 5678 9123 0000" style="width: 570px; height: 60px;font-size: 20px;margin-bottom: 30px;padding: 10px;border-radius: 10px; color: gray; border-color: rgb(211, 211, 211); font-family: 'Space Grotesk';">
                    <div style="display: flex; width: 286px; justify-content: space-between;">
                        <label for="date">Exp. Date (MM/YY)</label>
                        <label for="cvc">CVC</label>
                    </div>
                    <div style="display: flex;">
                        <div style="display: flex; gap: 30px; ">
                            <div style="display: flex; gap: 20px;">
                                <input type="text" name="" id="mm" placeholder="MM" style="width: 100px; height: 60px;font-size: 20px;margin-bottom: 30px;padding: 10px;border-radius: 10px; color: gray; border-color: rgb(211, 211, 211); font-family: 'Space Grotesk';">
                                <input type="text" name="" id="yy" placeholder="YY" style="width: 100px; height: 60px;font-size: 20px;margin-bottom: 30px;padding: 10px;border-radius: 10px; color: gray; border-color: rgb(211, 211, 211); font-family: 'Space Grotesk';">
                            </div>
                            <input type="text" name="" id="cvc" placeholder="e.g. 123" style="width:320px; height: 60px;font-size: 20px;margin-bottom: 30px;padding: 10px;border-radius: 10px; color: gray; border-color: rgb(211, 211, 211); font-family: 'Space Grotesk';">
                        </div>
                    </div>
                    <div>
                        <button style="background-color: black; color: white; width: 570px; height: 80px; border: none; font-size: 24px; border-radius: 10px;">Confirm</button>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
