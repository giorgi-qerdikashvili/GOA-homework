<!-- 1) კომენტარის სახით ახსენი როგორ დავამატოთ ფონტი css-ში
2) კომენტარის სახით ახსენი რა განსხვავებაა @import და <link> შორის
3) შექმენი მარტივი ვებგვერდი (სათაური + პარაგრაფი) და გამოიყენე განსხვავებული ფონტი სათაურისთვის და ტექსტისთვის. გამოიყენე Google Fonts (მაგ: Poppins, Roboto)სათაური იყოს ერთი ფონტით, ტექსტი – მეორეთი
4) შექმენი Quote Card. ციტატის ტექსტი იყოს (მაგ: Merriweather), ავტორის სახელი იყოს განსხვავებული, უფრო მინიმალისტური ფონტით (მაგ: Lato)
5) შექმენი Hero სექცია დიდი სათაურით.დააიმპორტე Google Fonts-დან ფონტი (მაგ: Poppins ან Oswald), სათაურს დაუმატე text-shadow, ჩრდილი იყოს ოდნავ ქვემოთ ჩამოწეული. -->
